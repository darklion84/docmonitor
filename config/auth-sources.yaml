# Источники за авторизацией для DocMonitor.
# Провижининг: src/docmonitor/auth_provision.py (читает .env, подставляет ${VAR},
# POST'ит / PUT'ит watch'и в CDIO REST API). Запуск:
#   docker compose exec -T office-adapter python /src/docmonitor/auth_provision.py
#
# Подробно: docs/auth-sources.md
#
# Поля:
#   id       - уникальный идентификатор; используется в маппинге state/auth_provision_map.json
#   title    - title watch'а в CDIO
#   url      - целевой URL отслеживаемой страницы (на эту страницу зайдёт браузер)
#   tag      - тег watch'а
#   time_between_check - {hours: N} | {minutes: N} | {seconds: N}
#   browser_steps - список шагов CDIO Browser Steps (Goto URL опускаем — CDIO сам открывает url выше)
#                   В значениях шагов можно использовать ${ENV_VAR} — provisioning подставит.
#
# Поддерживаемые operation (из CDIO): "Enter text in field", "Click element",
# "Click element containing text", "Goto URL", "Wait for seconds", "Wait for text".
sources:
  - id: amusnet-rest-api
    title: "Amusnet REST API docs"
    url: https://portal.api.amusnet.io/2.0/rest-api/rest-api/
    tag: amusnet
    time_between_check: { hours: 6 }
    browser_steps:
      - operation: Enter text in field
        selector: "#username"
        optional_value: "${AUTH_AMUSNET_USER}"
      - operation: Enter text in field
        selector: "#password"
        optional_value: "${AUTH_AMUSNET_PASS}"
      - operation: Click element
        selector: "#kc-login"
      - operation: Wait for seconds
        optional_value: "5"
