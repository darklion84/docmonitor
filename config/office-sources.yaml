# Источники Word/PDF-документов для DocMonitor Office adapter (ШАБЛОН).
#
# Этот файл намеренно ПУСТОЙ — при деплое адаптер ничего не обрабатывает,
# пока ниже нет активной секции `sources:`. Раскомментируйте и заведите свои.
#
# Адаптер пишет нормализованный текст в watched/<id>.txt; в CDIO заведите watch:
#   file:///datastore/watched/<id>.txt
#
# Поля:
#   id    — имя файла-результата (watched/<id>.txt), уникально
#   type  — doc | docx | pdf
#   src   — URL (http/https) ИЛИ путь к файлу в каталоге office-src/ (или абсолютный путь в контейнере)
#
# ПРИМЕЧАНИЕ: PDF по URL заводите как обычный watch в CDIO (нативная поддержка).
# Через адаптер гоните PDF, только если он ЛОКАЛЬНЫЙ (CDIO не умеет file://+PDF).
#
# ПОРЯДОК ВАЖЕН: сначала допишите источник СЮДА, потом кладите/пересохраняйте файл
# в office-src/. Иначе FS-событие создания отработает вхолостую (источник ещё не
# известен) и .txt появится только на периодическом проходе (~600с). Разовый прогон:
#   docker compose exec -T office-adapter python /src/docmonitor/office_adapter.py
#
# ─────────────────────────────────────────────────────────────────────────────
# ПРИМЕР (раскомментируйте и положите свои файлы в ./office-src/):
#
# sources:
#   - id: my-doc
#     type: docx
#     src: my-doc.docx          # лежит в ./office-src/my-doc.docx
#
#   - id: my-pdf
#     type: pdf
#     src: my-local.pdf         # лежит в ./office-src/my-local.pdf
#
#   - id: remote-doc
#     type: docx
#     src: https://example.com/spec.docx   # или по URL
